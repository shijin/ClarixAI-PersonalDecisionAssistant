kind = "web"
previewPath = "/"
title = "Clarix"
version = "1.0.0"
id = "artifacts/clarix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23314

[services.development]
run = "pnpm --filter @workspace/clarix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clarix", "run", "build" ]
publicDir = "artifacts/clarix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23314"
BASE_PATH = "/"
